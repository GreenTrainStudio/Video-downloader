<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M3U8 Finder</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <h1>M3U8 Finder</h1>
    <p id="status">Сканирование...</p>

    <section id="downloadsPanel" class="downloads-panel hidden">
      <div class="downloads-header">
        <strong>Загрузка видео</strong>
      </div>
      <ul id="downloadingList" class="downloading-list"></ul>
    </section>

    <div class="actions">
      <button id="refreshBtn">Обновить</button>
      <button id="downloadAllBtn" disabled>Скачать все видео</button>
    </div>
    <ul id="list"></ul>
  </main>
  <script src="popup.js"></script>
</body>
</html>
